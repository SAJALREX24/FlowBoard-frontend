<div
  *ngIf="isOpen"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4"
  (click)="onBackdropClick($event)"
>
  <div class="bg-white rounded-lg shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">

    <!-- Cover color band -->
    <div
      *ngIf="card?.coverColor"
      class="h-12 rounded-t-lg"
      [ngClass]="{
        'bg-red-500': card?.coverColor === 'RED',
        'bg-orange-500': card?.coverColor === 'ORANGE',
        'bg-yellow-400': card?.coverColor === 'YELLOW',
        'bg-green-500': card?.coverColor === 'GREEN',
        'bg-blue-500': card?.coverColor === 'BLUE',
        'bg-purple-500': card?.coverColor === 'PURPLE',
        'bg-pink-500': card?.coverColor === 'PINK'
      }"
    ></div>

    <!-- Header -->
    <div class="flex items-start justify-between p-6 pb-2">
      <div class="flex-1 mr-4">
        <ng-container *ngIf="card && !editingTitle">
          <h2
            class="text-2xl font-semibold text-gray-900 cursor-pointer hover:bg-gray-100 px-2 py-1 rounded -ml-2"
            (click)="startEditingTitle()"
            title="Click to edit"
          >
            {{ card.title }}
          </h2>
        </ng-container>

        <ng-container *ngIf="card && editingTitle">
          <input
            type="text"
            [(ngModel)]="titleDraft"
            (blur)="saveTitle()"
            (keydown.enter)="saveTitle()"
            (keydown.escape)="editingTitle = false"
            class="w-full text-2xl font-semibold text-gray-900 px-2 py-1 border border-blue-500 rounded focus:outline-none focus:ring-2 focus:ring-blue-300"
            #titleInput
            autofocus
          />
        </ng-container>
      </div>

      <button
        (click)="close()"
        class="text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none px-2"
        title="Close"
      >
        &times;
      </button>
    </div>

    <!-- Loading state -->
    <div *ngIf="loading" class="px-6 py-8 text-center text-gray-500">
      Loading card details...
    </div>

    <!-- Error message -->
    <div *ngIf="errorMessage" class="mx-6 my-2 px-4 py-2 bg-red-50 border border-red-200 text-red-700 rounded text-sm">
      {{ errorMessage }}
    </div>

    <!-- Body -->
    <div *ngIf="card && !loading" class="px-6 pb-6 space-y-6">

      <!-- Description -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
        <textarea
          [(ngModel)]="descriptionDraft"
          (blur)="saveDescription()"
          rows="4"
          placeholder="Add a more detailed description..."
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-blue-500 text-sm text-gray-800"
        ></textarea>
      </div>

      <!-- Metadata grid -->
      <div class="grid grid-cols-2 gap-4">

        <!-- Priority -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Priority</label>
          <select
            [ngModel]="card.priority || ''"
            (ngModelChange)="changePriority($event)"
            class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm bg-white"
          >
            <option value="">No priority</option>
            <option *ngFor="let p of priorityOptions" [value]="p">{{ p }}</option>
          </select>
        </div>

        <!-- Due date -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Due Date</label>
          <input
            type="date"
            [ngModel]="formatDateForInput(card.dueDate)"
            (ngModelChange)="changeDueDate($event)"
            class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm"
          />
        </div>

        <!-- Cover color -->
        <div class="col-span-2">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Cover Color</label>
          <div class="flex flex-wrap gap-2">
            <button
              *ngFor="let opt of coverColorOptions"
              (click)="changeCoverColor(opt.value)"
              [class.ring-2]="card.coverColor === opt.value"
              [class.ring-offset-2]="card.coverColor === opt.value"
              [class.ring-blue-500]="card.coverColor === opt.value"
              class="w-10 h-10 rounded border border-gray-200 hover:scale-110 transition-transform"
              [ngClass]="{
                'bg-white': opt.value === null,
                'bg-red-500': opt.value === 'RED',
                'bg-orange-500': opt.value === 'ORANGE',
                'bg-yellow-400': opt.value === 'YELLOW',
                'bg-green-500': opt.value === 'GREEN',
                'bg-blue-500': opt.value === 'BLUE',
                'bg-purple-500': opt.value === 'PURPLE',
                'bg-pink-500': opt.value === 'PINK'
              }"
              [title]="opt.label"
            >
              <span *ngIf="opt.value === null" class="text-xs text-gray-500">None</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Card metadata footer -->
      <div class="text-xs text-gray-500 pt-4 border-t border-gray-200 space-y-1">
        <div>Card ID: {{ card.cardId }}</div>
        <div>Created: {{ card.createdAt | date:'medium' }}</div>
        <div *ngIf="card.updatedAt !== card.createdAt">Last updated: {{ card.updatedAt | date:'medium' }}</div>
      </div>
    </div>

    <!-- Footer actions -->
    <div *ngIf="card && !loading" class="flex items-center justify-between px-6 py-4 bg-gray-50 rounded-b-lg border-t border-gray-200">
      <button
        (click)="deleteCard()"
        class="px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded transition-colors"
      >
        Delete card
      </button>
      <button
        (click)="close()"
        class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded hover:bg-gray-100 transition-colors"
      >
        Close
      </button>
    </div>

  </div>
</div>
