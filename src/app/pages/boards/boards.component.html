<div class="min-h-screen bg-gray-50">
  <header class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold text-indigo-600 cursor-pointer" (click)="backToWorkspaces()">FlowBoard</h1>
        <span class="text-gray-300">/</span>
        <span class="text-sm text-gray-700 font-medium">{{ workspace?.name || '...' }}</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-600">{{ currentUserName }}</span>
        <button (click)="logout()" class="text-sm text-gray-600 hover:text-gray-900 font-medium">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="mb-2">
      <button (click)="backToWorkspaces()" class="text-sm text-gray-600 hover:text-indigo-600">← All Workspaces</button>
    </div>

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-3xl font-bold text-gray-900">Boards</h2>
        <p *ngIf="workspace?.description" class="text-gray-500 mt-1">{{ workspace?.description }}</p>
      </div>
      <button (click)="toggleCreateForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition">
        {{ showCreateForm ? 'Cancel' : '+ New Board' }}
      </button>
    </div>

    <div *ngIf="showCreateForm" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-6">
      <h3 class="text-lg font-semibold mb-4">Create New Board</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
          <input type="text" [(ngModel)]="newName" placeholder="e.g. Sprint 1 Board" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea [(ngModel)]="newDescription" rows="2" placeholder="Optional description" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Visibility</label>
            <select [(ngModel)]="newVisibility" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
              <option value="PRIVATE">Private</option>
              <option value="PUBLIC">Public</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Background Color</label>
            <select [(ngModel)]="newColor" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
              <option *ngFor="let color of colors" [value]="color">{{ color }}</option>
            </select>
          </div>
        </div>
        <button (click)="createBoard()" [disabled]="isCreating || !newName.trim()" class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white px-6 py-2 rounded-lg font-medium transition">
          {{ isCreating ? 'Creating...' : 'Create Board' }}
        </button>
      </div>
    </div>

    <div *ngIf="isLoading" class="text-center py-12 text-gray-500">Loading boards...</div>
    <div *ngIf="errorMessage && !isLoading" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">{{ errorMessage }}</div>

    <div *ngIf="!isLoading && !errorMessage && boards.length === 0" class="text-center py-12">
      <p class="text-gray-500 mb-4">No boards in this workspace yet.</p>
      <button (click)="toggleCreateForm()" class="text-indigo-600 hover:text-indigo-700 font-medium">Create your first board →</button>
    </div>

    <div *ngIf="!isLoading && boards.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <div
        *ngFor="let board of boards"
        (click)="openBoard(board.boardId)"
        class="rounded-xl shadow-sm overflow-hidden hover:shadow-md transition cursor-pointer"
      >
        <div [class]="getColorClass(board.backgroundColor) + ' h-24'"></div>
        <div class="bg-white p-4">
          <h3 class="font-semibold text-gray-900 mb-1">{{ board.name }}</h3>
          <p *ngIf="board.description" class="text-xs text-gray-500 line-clamp-2">{{ board.description }}</p>
        </div>
      </div>
    </div>
  </main>
</div>
